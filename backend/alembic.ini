# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration file names
# Set to a timestamp-based name for easy ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for %%(year)d etc. tokens (leave empty for local)
timezone = UTC

# Truncate the slug (description) to this length
truncate_slug_length = 40

# sys.path manipulation
prepend_sys_path = .

# version_path_separator: os, :, ;, space (default: os)
version_path_separator = os

# SQLAlchemy URL — overridden at runtime by alembic/env.py from app.config
sqlalchemy.url = postgresql+asyncpg://gscc:gscc_password@db:5432/gscc_db

[post_write_hooks]
# Uncomment to auto-format generated migration files with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
