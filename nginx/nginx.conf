# Production reverse proxy — routes traffic to frontend and backend containers
#
# Serves:
#   /          → frontend (nginx static)
#   /api/      → backend (FastAPI)
#   /docs      → backend Swagger UI
#   /flower/   → Celery Flower monitoring (protect with basic auth)

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream flower {
    server flower:5555;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI docs (restrict in production if needed)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Flower monitoring UI
    location /flower/ {
        proxy_pass http://flower/;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
